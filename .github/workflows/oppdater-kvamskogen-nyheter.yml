name: Oppdater Kvamskogen-mediesaker

on:
  workflow_dispatch:
    inputs:
      days:
        description: Antall dager tilbake i tid
        required: false
        default: '30'
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write

jobs:
  oppdater-nyheter:
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
      DAYS_BACK: ${{ github.event.inputs.days || '30' }}
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Hent mediesaker
        run: |
          if [ -z "$GOOGLE_API_KEY" ] || [ -z "$GOOGLE_CSE_ID" ]; then
            echo "::warning::GOOGLE_API_KEY eller GOOGLE_CSE_ID mangler som repository secret. Legg dem inn under Settings → Secrets and variables → Actions."
            python kvamskogen_news_search.py --days "$DAYS_BACK" --no-write
            exit 0
          fi
          python kvamskogen_news_search.py --days "$DAYS_BACK"

      - name: Commit oppdaterte datafiler
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/kvamskogen_news.json public/data/kvamskogen_news.csv public/data/kvamskogen_news.md
          if git diff --cached --quiet; then
            echo "Ingen endringer i mediesaker."
          else
            git commit -m "Oppdater Kvamskogen-mediesaker"
            git push
          fi

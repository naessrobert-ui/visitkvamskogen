name: Hent viltkamerabilder

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: hent-viltkamerabilder
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  hent-bilder:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v5

      - name: Sett opp Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Hent nye bilder fra Gmail
        env:
          GMAIL_ADDRESS: ${{ secrets.WILDLIFE_GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.WILDLIFE_GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/hent-viltkamerabilder.py
